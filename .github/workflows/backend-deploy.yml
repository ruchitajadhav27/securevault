name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Verify build
        working-directory: ./backend
        run: |
          npm run start --dry-run || npm list

      - name: Validate Render secret
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
            echo "❌ Missing secret RENDER_DEPLOY_HOOK_BACKEND"
            exit 1
          fi

      - name: Deploy to Render
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          curl "$RENDER_DEPLOY_HOOK"
          echo "✅ Deployment hook triggered"
