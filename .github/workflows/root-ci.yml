name: Root CI Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Validate required secrets
        if: github.event_name == 'push'
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "❌ Missing secret RENDER_DEPLOY_HOOK"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "❌ Missing secret VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "❌ Missing secret VERCEL_ORG_ID"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "❌ Missing secret VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || github.event.pull_request.base.sha }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Validate workflows
        run: |
          if [ -d .github/workflows ]; then
            echo "✅ GitHub Actions workflows found"
          else
            echo "⚠️  No workflows directory found"
          fi
